name: WACC CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: wacc-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUN_FRONTEND_INTEGRATION_TESTS: ${{ vars.RUN_FRONTEND_INTEGRATION_TESTS || 'true' }}
  RUN_BACKEND_INTEGRATION_TESTS: ${{ vars.RUN_BACKEND_INTEGRATION_TESTS || 'true' }}

jobs:
  compile:
    name: Compile
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Restore Coursier cache
        uses: coursier/cache-action@v6

      - name: Set up Scala CLI
        uses: VirtusLab/scala-cli-setup@v1.14.0
        with:
          jvm: temurin:21

      - name: Compile
        shell: bash
        run: |
          set -euo pipefail
          scala-cli compile . --server=false --jvm system

  unit-test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: [compile]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Restore Coursier cache
        uses: coursier/cache-action@v6

      - name: Set up Scala CLI
        uses: VirtusLab/scala-cli-setup@v1.14.0
        with:
          jvm: temurin:21

      - name: Run unit tests
        shell: bash
        run: |
          set -euo pipefail
          scala-cli test . --test-only 'wacc.unit_test*' --server=false --jvm system \
            | tee wacc-unit-test.log

      - name: Upload unit-test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wacc-unit-test-log
          path: wacc-unit-test.log
          if-no-files-found: warn
          retention-days: 1

  integration-test-frontend:
    name: Frontend integration tests
    runs-on: ubuntu-latest
    needs: [unit-test]
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Restore Coursier cache
        uses: coursier/cache-action@v6

      - name: Set up Scala CLI
        uses: VirtusLab/scala-cli-setup@v1.14.0
        with:
          jvm: temurin:21

      - name: Run frontend integration tests
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$RUN_FRONTEND_INTEGRATION_TESTS" == "true" ]]; then
            test -d examples || {
              echo "missing ./examples in repo" | tee -a integration_frontend.log
              exit 1
            }

            timeout -k 10s 15m scala-cli test . \
              --test-only 'wacc.integration_test.frontend.*' \
              --server=false --jvm system \
              | tee integration_frontend.log
          else
            echo "Frontend integration tests disabled" | tee integration_frontend.log
          fi

      - name: Upload frontend integration-test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-frontend-log
          path: integration_frontend.log
          if-no-files-found: warn
          retention-days: 7

  integration-test-backend:
    name: Backend integration tests
    runs-on: ubuntu-latest
    needs: [integration-test-frontend]
    timeout-minutes: 35
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Restore Coursier cache
        uses: coursier/cache-action@v6

      - name: Set up Scala CLI
        uses: VirtusLab/scala-cli-setup@v1.14.0
        with:
          jvm: temurin:21
          power: true

      - name: Install ARM toolchains and QEMU
        if: env.RUN_BACKEND_INTEGRATION_TESTS == 'true'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            coreutils \
            gcc-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi \
            libc6-dev-arm64-cross \
            libc6-dev-armel-cross \
            qemu-user

      - name: Run backend integration tests
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$RUN_BACKEND_INTEGRATION_TESTS" != "true" ]]; then
            echo "Backend tests disabled (RUN_BACKEND_INTEGRATION_TESTS != true)" \
              | tee integration_backend.log
            exit 0
          fi

          echo "Running backend integration tests" | tee integration_backend.log

          command -v arm-linux-gnueabi-gcc >/dev/null 2>&1 || {
            echo "missing arm-linux-gnueabi-gcc" | tee -a integration_backend.log
            exit 1
          }
          command -v qemu-arm >/dev/null 2>&1 || {
            echo "missing qemu-arm" | tee -a integration_backend.log
            exit 1
          }
          command -v aarch64-linux-gnu-gcc >/dev/null 2>&1 || {
            echo "missing aarch64-linux-gnu-gcc" | tee -a integration_backend.log
            exit 1
          }
          command -v qemu-aarch64 >/dev/null 2>&1 || {
            echo "missing qemu-aarch64" | tee -a integration_backend.log
            exit 1
          }
          command -v timeout >/dev/null 2>&1 || {
            echo "missing timeout (coreutils)" | tee -a integration_backend.log
            exit 1
          }
          test -d examples || {
            echo "missing ./examples in repo" | tee -a integration_backend.log
            exit 1
          }

          scala-cli --power package . -o wacc-compiler \
            --server=false --jvm system --force \
            | tee -a integration_backend.log
          chmod +x ./compile ./wacc-compiler

          timeout -k 2m 33m scala-cli test . \
            --test-only 'wacc.integration_test.backend.*' \
            --server=false --jvm system \
            | tee -a integration_backend.log

      - name: Upload backend integration-test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-backend-log
          path: integration_backend.log
          if-no-files-found: warn
          retention-days: 7
